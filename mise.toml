# mise — single source of truth for language tool versions + task runner.
# Nix provides `mise` itself; mise provides python/uv; uv manages Python deps.
# Run `mise install` to materialize the toolchain, then `mise run <task>`.

[tools]
python = "3.11"
uv = "latest"

[settings]
# Let uv create and manage the project virtualenv (.venv) automatically.
python.uv_venv_auto = true

[env]
# Keep all model/sandbox traffic local by default; the loop must not reach the network.
SIRO_ALLOW_NETWORK = "false"
# mise is the single source of truth for the Python version; make uv target the
# pinned interpreter instead of discovering a different one.
UV_PYTHON = "3.11"

[tasks.sync]
description = "Resolve and install Python dependencies into .venv"
run = "uv sync"

[tasks.test]
description = "Run the full test suite"
run = "uv run pytest"

[tasks.lint]
description = "Static checks"
run = "uv run ruff check ."

[tasks.fmt]
description = "Format code"
run = "uv run ruff format ."

[tasks.run-task]
description = "Run a code-improver experiment, e.g. mise run run-task -- tasks/code_improver/task_001"
run = "uv run siro run-task"

[tasks.run-training]
description = "Run a tiny-training experiment, e.g. mise run run-training -- tasks/training/task_001"
run = "uv run siro run-training"

[tasks.summarize]
description = "Summarize archived attempts"
run = "uv run siro summarize-runs runs/attempts.jsonl"

[tasks.serve-model]
description = "Start the local llama.cpp model server (LlamaBarn) and wait for its OpenAI-compatible API"
# Default Tier 0 backend is LlamaBarn, which serves an OpenAI-compatible API at 127.0.0.1:2276.
# Alternative: run llama-server directly, e.g.
#   llama-server --host 127.0.0.1 --port 2276 --model <path-to>.gguf
run = """
open -a LlamaBarn
until curl -sf http://127.0.0.1:2276/v1/models >/dev/null; do sleep 1; done
echo "LlamaBarn ready at http://127.0.0.1:2276/v1"
"""
