# Tier 0 with the drug/life-science pack selected.
# Two-stage workflow: cheap offline in-silico screening (Regime B, pinned surrogate fixtures)
# runs fully offline in the sandbox; the rare wet-lab confirmation (Regime C) is governed,
# human-executed, and never touches the execution plane.
tier: 0
pack: life_science

providers:
  local:
    backend: llamacpp
    base_url: http://127.0.0.1:2276/v1
    name: unsloth/Qwen3.6-27B-GGUF:Q8_0
    timeout_seconds: 120

agent_models:
  default: local

sandbox:
  timeout_seconds: 30
  network: disabled
  max_attempts_per_task: 20

evaluation:
  primary_metric: predicted_affinity
  require_reproducibility: true

safety:
  allow_network: false
  allow_package_install: false
  allow_evaluator_edits: false
