# Tier 2 — governed scale-up. Every capability beyond Tier 1 (larger compute, longer
# experiments, model-training, deploying a trained model) is gated by an explicit
# human-approved governance gate. See docs/07_model_providers_and_tiers.md and
# docs/goal_prompts/goal_10_governance_gate.md.
#
# Selecting or lowering a tier is config-only, never a code change: drop `tier` back to 1
# or 0 and the governed capabilities are simply not offered (with no approvals on record,
# everything default-denies — a lower tier is always safe).
tier: 2

providers:
  local:
    backend: llamacpp
    base_url: http://127.0.0.1:2276/v1
    name: unsloth/Qwen3.6-27B-GGUF:Q8_0
    timeout_seconds: 120
  anthropic:
    backend: anthropic
    name: claude-opus-4-8
    api_key_env: ANTHROPIC_API_KEY
    timeout_seconds: 120
    prices:
      input_per_mtok: 5.0
      output_per_mtok: 25.0
      cached_input_per_mtok: null
      last_reviewed: "2026-06-25"
      source_note: "Repo-maintained pricing estimate; refresh from provider docs before scale decisions."
  openai:
    backend: openai
    name: gpt-5.4
    api_key_env: OPENAI_API_KEY
    timeout_seconds: 120
    prices:
      input_per_mtok: 2.5
      output_per_mtok: 15.0
      cached_input_per_mtok: null
      last_reviewed: "2026-06-25"
      source_note: "Repo-maintained pricing estimate; refresh from provider docs before scale decisions."

agent_models:
  hypothesis: anthropic
  literature: anthropic
  implementation: anthropic
  evaluation: local
  safety: openai                             # cross-model reviewer, distinct from implementer
  interpretation: anthropic
  memory: anthropic
  meta_research: anthropic

sandbox:
  timeout_seconds: 10
  network: disabled                          # execution plane is always offline, at every tier
  max_attempts_per_task: 20

# Governed compute scale-up (Goal 11) + hard resource isolation (Goal 15). Each compute tier
# is a hard wall-clock + memory + process-count ceiling; tier 0 is free, higher tiers are
# governed (promotion-before-budget + a human approval). `backend` is the default isolation
# backend and `hard_backend_above_tier` forces a hard, OS-enforced backend (`linux_guarded`)
# above that tier — the portable `local` monitor is a developer fallback and only stands in
# above the threshold when `allow_local_dev` is set. A candidate never selects the backend.
compute:
  backend: local                             # default isolation backend (local | linux_guarded)
  hard_backend_above_tier: 0                  # tiers > 0 require hard, OS-enforced isolation
  allow_local_dev: false                      # set true only for local development on a portable host
  tiers:
    0:
      wall_clock_seconds: 15
      memory_mb: 512
      max_processes: 16
    1:
      wall_clock_seconds: 60
      memory_mb: 1024
      max_processes: 32
    2:
      wall_clock_seconds: 300
      memory_mb: 2048
      max_processes: 64

# Durable research store (Goal 16). JSONL stays the default, transparent audit/export format;
# `backend: sqlite` opts into a queryable SQLite store with schema migrations, idempotent
# writes, and hash-chained tamper-evidence for governance/artifact records. Lowering back to
# `jsonl` (or omitting this block) is config-only and always safe; the SQLite store is never a
# hidden dependency for Tier 0 local tests. Changing audit retention or tamper-evidence policy
# is human-gated.
storage:
  backend: jsonl                             # jsonl (default) | sqlite
  path: runs/siro.db                         # SQLite database path when backend=sqlite

evaluation:
  primary_metric: pytest_pass_rate
  require_reproducibility: true

budget:
  max_usd_per_run: 5.00
  max_usd_per_day: 50.00
  max_tokens_per_call: 8000

# Tier 2 governance gate (Goal 10). The governed-action set is the bounds of
# docs/13_self_improvement_loop.md; a governed action proceeds only with a recorded,
# human-issued, hash-bound, unexpired approval. Agents may request, never approve.
governance:
  enabled: true
  approvals_path: runs/approvals.jsonl

safety:
  allow_network: true                        # control-plane egress (allowlisted only)
  allow_package_install: false
  allow_evaluator_edits: false

network:
  egress: allowlist
  allowed_endpoints:
    - api.anthropic.com
    - api.openai.com
    - 127.0.0.1:2276
