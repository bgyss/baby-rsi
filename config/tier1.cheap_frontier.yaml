# Tier 1 cheap-frontier pilot profile.
# Same lifecycle and execution-plane isolation as config/tier1.frontier.yaml, but lower
# per-run/day budget ceilings and cheaper provider bindings for Goal 20 measurement.
tier: 1

providers:
  local:
    backend: llamacpp
    base_url: http://127.0.0.1:2276/v1
    name: unsloth/Qwen3.6-27B-GGUF:Q8_0
    timeout_seconds: 120
    ops:
      concurrency_limit: 1
      requests_per_minute: 60
      retry:
        max_attempts: 1
  openai:
    backend: openai
    name: gpt-5.4-mini
    api_key_env: OPENAI_API_KEY
    timeout_seconds: 120
    prices:
      input_per_mtok: 0.15
      output_per_mtok: 0.60
      cached_input_per_mtok: null
      last_reviewed: "2026-06-25"
      source_note: "Repo-maintained cheap-frontier pilot estimate; refresh from provider docs before spend decisions."
    ops:
      concurrency_limit: 1
      requests_per_minute: 20
      retry:
        max_attempts: 2
        initial_backoff_seconds: 0.25
        max_backoff_seconds: 1.0
        jitter_seconds: 0.05

agent_models:
  hypothesis: openai
  literature: openai
  implementation: openai
  evaluation: local
  safety: local
  interpretation: openai
  memory: openai
  meta_research: openai

sandbox:
  timeout_seconds: 10
  network: disabled
  max_attempts_per_task: 20

evaluation:
  primary_metric: pytest_pass_rate
  require_reproducibility: true

budget:
  max_usd_per_run: 2.00
  max_usd_per_day: 10.00
  max_tokens_per_call: 4000

safety:
  allow_network: true
  allow_package_install: false
  allow_evaluator_edits: false

network:
  egress: allowlist
  allowed_endpoints:
    - api.openai.com
    - 127.0.0.1:2276
